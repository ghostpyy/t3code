name: Sync from upstream

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Merge pingdotgg/t3code into main
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "ghostpyy-sync[bot]"
          git config user.email "ghostpyy-sync@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/pingdotgg/t3code.git

      - name: Fetch upstream
        run: git fetch upstream main

      - id: status
        name: Determine sync state
        shell: bash
        run: |
          base=$(git merge-base HEAD upstream/main)
          upstream=$(git rev-parse upstream/main)
          if [[ "$base" == "$upstream" ]]; then
            echo "result=up-to-date" >> "$GITHUB_OUTPUT"
          else
            echo "result=needs-merge" >> "$GITHUB_OUTPUT"
            echo "behind=$(git rev-list --count "$base..$upstream")" >> "$GITHUB_OUTPUT"
          fi

      - id: merge
        name: Merge upstream/main into main
        if: steps.status.outputs.result == 'needs-merge'
        shell: bash
        run: |
          # --no-ff forces a merge commit even on fast-forwardable histories
          # so every upstream sync is a single identifiable point in the log.
          # Fork commits keep their stable SHAs; origin/main is append-only.
          behind="${{ steps.status.outputs.behind }}"
          if git merge --no-ff --no-edit \
              -m "chore: merge upstream/main ($behind commit(s))" \
              upstream/main; then
            echo "result=clean" >> "$GITHUB_OUTPUT"
            echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Push merged main
        if: steps.merge.outputs.result == 'clean'
        run: git push origin main

      - name: Trigger fork release build
        # The default GITHUB_TOKEN cannot fire downstream `push` workflows
        # (security: prevents recursive workflow chains), so the push to main
        # above does NOT auto-trigger fork-release.yml. Dispatching it via the
        # gh CLI does fire it, even with the default token. We target
        # fork-release.yml — NOT upstream's release.yml — because release.yml
        # uses blacksmith self-hosted runners that the fork can't access (its
        # scheduled runs queue indefinitely).
        if: steps.merge.outputs.result == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run fork-release.yml --ref main

      - name: Open conflict issue
        if: steps.merge.outputs.result == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_BEHIND: ${{ steps.status.outputs.behind }}
        run: |
          existing=$(gh issue list --state open --search '"[upstream-sync] merge conflict" in:title' --json number --jq '.[0].number // empty')
          if [[ -n "$existing" ]]; then
            echo "Conflict issue #$existing already open. Skipping."
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          gh issue create \
            --title "[upstream-sync] merge conflict ($today)" \
            --body "Automatic merge from \`pingdotgg/t3code@main\` failed. Upstream is **${UPSTREAM_BEHIND}** commit(s) ahead of our merge base.

          Resolve locally:

          \`\`\`bash
          bash scripts/sync-upstream.sh
          # resolve conflicts in your editor, then:
          git add -A
          git commit --no-edit
          git push origin main
          \`\`\`

          Close this issue once \`main\` contains the upstream commits."

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## Upstream sync result" >> "$GITHUB_STEP_SUMMARY"
          echo "- status: ${{ steps.status.outputs.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- merge: ${{ steps.merge.outputs.result || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.merge.outputs.result }}" == 'clean' ]]; then
            echo "- new HEAD: ${{ steps.merge.outputs.head }}" >> "$GITHUB_STEP_SUMMARY"
          fi
